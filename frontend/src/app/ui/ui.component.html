<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" style="color:white;">Employee Manager</a>

    <div class="collapse navbar-collapse" id="navbarColor02">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" style="cursor: pointer;" (click)="onOpenModal(null, 'add')">
            Add Employee
          </a>
        </li>
      </ul>

      <form class="d-flex my-2 my-lg-0">
        <input type="search"
               #key
               (input)="searchEmployees(key.value)"
               class="form-control me-sm-2"
               placeholder="Search employees...">
      </form>
    </div>
  </div>
</nav>

<div class="container" id="main-container">
  <div class="row">
    <div *ngFor="let employee of employees" class="col-md-6 col-xl-3">
      <div class="card m-b-30 shadow-sm mt-3">

        <div class="card-body row">
          <div class="col-6">
            <img [src]="employee.imageUrl" class="img-fluid rounded-circle w-60">
          </div>

          <div class="col-6 card-title align-self-center mb-0">
            <h5>{{ employee.name }}</h5>
            <p class="m-0 text-muted small">{{ employee.jobTitle }}</p>
          </div>
        </div>

        <ul class="list-group list-group-flush">
          <li class="list-group-item">
            <i class="fa fa-envelope float-end"></i>
            {{ employee.email }}
          </li>

          <li class="list-group-item">
            <i class="fa fa-phone float-end"></i>
            {{ employee.phone }}
          </li>
        </ul>

        <div class="card-body">
          <div class="float-end btn-group btn-group-sm">
            <a (click)="onOpenModal(employee, 'edit')" class="btn btn-primary text-white">
              <i class="fa fa-pencil"></i>
            </a>

            <a (click)="onOpenModal(employee, 'delete')" class="btn btn-secondary text-white">
              <i class="fa fa-times"></i>
            </a>
          </div>
        </div>

      </div>
    </div>

    <!-- NO EMPLOYEES -->
    <div *ngIf="isLoaded && employees.length === 0" class="col-lg-12 mt-4">
      <div class="alert alert-info">
        <h4>NO EMPLOYEES!</h4>
        <p>No Employees were found.</p>
      </div>
    </div>

    <!-- LOADING -->
    <div *ngIf="!isLoaded" class="text-center mt-5">
      <h4>Loading employees...</h4>
    </div>

  </div>
</div>

<!-- add -->
<div class="modal fade" id="addEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Employee</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form #addForm="ngForm" (ngSubmit)="onAddEmployee(addForm)">

          <input type="text" name="name" ngModel class="form-control mb-2" placeholder="Name" required>
          <input type="email" name="email" ngModel class="form-control mb-2" placeholder="Email" required>
          <input type="text" name="phone" ngModel class="form-control mb-2" placeholder="Phone" required>
          <input type="text" name="jobTitle" ngModel class="form-control mb-2" placeholder="Job Title" required>
          <input type="text" name="imageUrl" ngModel class="form-control mb-2" placeholder="Image URL">

          <button type="submit" data-bs-dismiss="modal" class="btn btn-primary w-100">
            Add
          </button>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- update -->
<div class="modal fade" id="updateEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Update Employee</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" *ngIf="editEmployee">

        <form (ngSubmit)="onUpdateEmployee(editEmployee)">

          <input type="hidden" [(ngModel)]="editEmployee.id" name="id">

          <input type="text" [(ngModel)]="editEmployee.name" name="name" class="form-control mb-2">
          <input type="email" [(ngModel)]="editEmployee.email" name="email" class="form-control mb-2">
          <input type="text" [(ngModel)]="editEmployee.phone" name="phone" class="form-control mb-2">
          <input type="text" [(ngModel)]="editEmployee.jobTitle" name="jobTitle" class="form-control mb-2">

          <button type="submit" data-bs-dismiss="modal" class="btn btn-success w-100">
            Update
          </button>

        </form>

      </div>

    </div>
  </div>
</div>

<!-- delete -->
<div class="modal fade" id="deleteEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Delete Employee</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center" *ngIf="deleteEmployee">

        <p>Are you sure you want to delete <b>{{ deleteEmployee.name }}</b>?</p>

        <button class="btn btn-danger"
                data-bs-dismiss="modal"
                (click)="onDeleteEmployee(deleteEmployee.id)">
          Yes, Delete
        </button>

      </div>

    </div>
  </div>
</div>
